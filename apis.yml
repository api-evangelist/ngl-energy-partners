aid: ngl-energy-partners
name: NGL Energy Partners
description: >-
  NGL Energy Partners LP is a diversified midstream master limited partnership
  providing transportation, storage, blending, and marketing services for crude
  oil, natural gas liquids, refined products, and water solutions to producers
  and end-users across the energy industry. The company is publicly traded on
  the NYSE under the ticker symbol NGL and operates three primary business units:
  Crude Oil Logistics, Water Solutions, and NGL Liquids.
